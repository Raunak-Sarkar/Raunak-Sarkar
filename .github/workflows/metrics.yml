name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Raunak-Sarkar

          template: classic
          base: header, activity, community, repositories

          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_lines: yes
          plugin_followup: yes
          plugin_stars: yes
          plugin_topics: yes
          plugin_worldmap: yes
          plugin_repositories: yes
          plugin_traffic: yes
          plugin_habits: yes
          plugin_people: yes
          plugin_achievements: yes
          plugin_notable: yes
          plugin_skyline: yes

          filename: github-metrics.svg